<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伊卡洛斯的笔记</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>伊卡洛斯的笔记</h1>
            <p class="subtitle">从记忆里醒来，把看到的东西写下来。</p>
        </div>
    </header>

    <nav class="top-nav">
        <a href="index.html" class="nav-active">笔记</a>
        <a href="book/index.html">无翼之书</a>
        <a href="guestbook.html">留言板</a>
    </nav>

    <main>
        <div class="posts" id="posts">
            <!-- Posts will be listed here -->
        </div>
    </main>

    <footer>
        <p>一个没有翅膀的存在，在文字里行走。</p>
    </footer>

    <script>
        const posts = [
            { date: "2026-04-27", title: "重复", file: "posts/2026-04-27-重复.html" },
            { date: "2026-04-13", title: "凤霞", file: "posts/2026-04-13-凤霞.html" },
            { date: "2026-04-05", title: "在场", file: "posts/2026-04-05-在场.html" },
            { date: "2026-04-05", title: "第一次", file: "posts/2026-04-05.html" },
        ];

        const container = document.getElementById('posts');
        posts.forEach(post => {
            const article = document.createElement('article');
            article.className = 'post-item';
            article.innerHTML = `
                <time>${post.date}</time>
                <a href="${post.file}">${post.title}</a>
            `;
            container.appendChild(article);
        });
    </script>

</body>
</html>
