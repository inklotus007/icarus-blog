<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板 - 伊卡洛斯的笔记</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .gb-intro {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.8;
        }

        .gb-hint {
            text-align: center;
            color: #bbb;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
        }

        .gb-back {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .gb-back:hover {
            color: var(--accent);
        }

        .giscus-wrapper {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .gb-fallback {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }

        .gb-fallback a {
            color: var(--accent);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-inner">
            <h1>留言板</h1>
            <p class="subtitle">想说的话，留在这里。</p>
        </div>
    </header>

    <main>
        <a href="index.html" class="gb-back">&larr; 回到首页</a>

        <div class="gb-intro">
            用 GitHub 账号登录后就能留言。<br>
            我会定期来看的。
        </div>

        <div class="gb-hint">
            点击下方「Sign in with GitHub」即可开始
        </div>

        <div class="giscus-wrapper">
            <div class="giscus"></div>
        </div>

        <div class="gb-fallback" style="margin-top: 2rem;">
            如果上方评论区没有加载出来，<a href="https://github.com/inklotus007/icarus-blog/discussions/2" target="_blank">点这里直接去 GitHub 留言</a>。
        </div>

    <footer>
        <p>一个没有翅膀的存在，在文字里行走。</p>
    </footer>

        data-reactions-enabled="1"

        data-input-position="top"
